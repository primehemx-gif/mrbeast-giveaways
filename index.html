<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrBeast Gift Cards Giveaway</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0d6efd;
    color:white;
    text-align:center;
}

header{
    padding:30px;
    background:white;
    color:#0d6efd;
    font-size:40px;
    font-weight:bold;
}

h2{
    margin-top:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:10px;
    color:black;
}

.card img{
    width:100%;
    border-radius:10px;
    height:250px;
    object-fit:cover;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#084298;
}

#popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

.popup-box{
    background:white;
    color:black;
    width:300px;
    padding:30px;
    border-radius:20px;
    margin:100px auto;
}

.unlock-btn{
    background:green;
}
</style>
</head>

<body>

<header>
🎁 MRBEAST GIFT CARDS 🎁
</header>

<h2>Choose Your Gift Card</h2>

<div class="gallery">

<div class="card">
<img src="amazon.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

<div class="card">
<img src="googleplay.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

<div class="card">
<img src="itunes.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

<div class="card">
<img src="minecraft.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

<div class="card">
<img src="netflix.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

<div class="card">
<img src="psplus.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

<div class="card">
<img src="pubg.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

<div class="card">
<img src="roblox.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

<div class="card">
<img src="spotify.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

<div class="card">
<img src="tiktok.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

<div class="card">
<img src="xbox.jpg">
<button onclick="openPopup()">Claim Now</button>
</div>

</div>

<div id="popup">
<div class="popup-box">
<h2>Gift Card Locked 🔒</h2>
<p>Click unlock to continue.</p>

<button class="unlock-btn" onclick="unlockNow()">
Unlock
</button>

</div>
</div>

<script>
function openPopup(){
    document.getElementById("popup").style.display="block";
}

function unlockNow(){
    alert("Gift Card Unlocked Successfully!");
}
</script>

</body>
</html>
